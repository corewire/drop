---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - create
  - delete
  - get
  - list
  - watch
- apiGroups:
  - ""
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - drop.corewire.io
  resources:
  - cachedimages
  - cachedimagesets
  - discoverypolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - drop.corewire.io
  resources:
  - cachedimages/finalizers
  - cachedimagesets/finalizers
  - discoverypolicies/finalizers
  verbs:
  - update
- apiGroups:
  - drop.corewire.io
  resources:
  - cachedimages/status
  - cachedimagesets/status
  - discoverypolicies/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - drop.corewire.io
  resources:
  - pullpolicies
  verbs:
  - get
  - list
  - watch
