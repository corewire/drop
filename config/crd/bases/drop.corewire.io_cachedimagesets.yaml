    categories:
    - drop
    kind: CachedImageSet
    listKind: CachedImageSetList
    plural: cachedimagesets
    singular: cachedimageset
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].reason
