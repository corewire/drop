    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: CachedImageSet manages a group of images to cache, optionally
          backed by a DiscoveryPolicy.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              CachedImageSetSpec defines the desired state of CachedImageSet.
              A CachedImageSet creates and manages child CachedImage resources automatically.
              All spec fields (nodeSelector, tolerations, imagePullPolicy, imagePullSecrets, policyRef)
              are propagated to every child CachedImage.
            properties:
              discoveryPolicyRef:
                description: |-
                  DiscoveryPolicyRef references a DiscoveryPolicy that provides a dynamic image list.
                  When set, the operator reads status.discoveredImages from the referenced DiscoveryPolicy
                  and creates/deletes child CachedImages accordingly. Can be combined with static images.
                  Example: {name: "popular-build-images"}
                properties:
                  name:
                    description: Name of the DiscoveryPolicy resource.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              imagePullPolicy:
                default: Always
                description: |-
                  ImagePullPolicy controls when kubelet pulls images. Propagated to all child CachedImages.
                  Default: "Always". See CachedImage.spec.imagePullPolicy for details.
                enum:
                - Always
                - IfNotPresent
                - Never
                type: string
              imagePullSecrets:
                description: |-
                  ImagePullSecrets for private registries. Propagated to all child CachedImages.
                  Secrets must exist in the namespace where Drop creates pull Pods (default: "drop-system").
                  Example: [{name: "ghcr-creds"}]
                items:
                  description: |-
                    LocalObjectReference contains enough information to let you locate the
                    referenced object inside the same namespace.
                  properties:
                    name:
                      default: ""
                      description: |-
                        Name of the referent.
                        This field is effectively required, but due to backwards compatibility is
                        allowed to be empty. Instances of this type with an empty value here are
                        almost certainly wrong.
                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                      type: string
                  type: object
                  x-kubernetes-map-type: atomic
                type: array
              images:
                description: |-
                  Images is a static list of images to cache. Each entry creates one child CachedImage.
                  Can be used alone or combined with discoveryPolicyRef (both lists are merged).
                items:
                  description: ImageEntry defines a single image to include in a set.
                  properties:
                    digest:
                      description: |-
                        Digest to pull as an immutable reference. Mutually exclusive with Tag.
                        Example: "sha256:a3ed95caeb02ffe68cdd9fd84406680ae93d633cb16422d00e8a7c22955b46d4"
                      type: string
                    image:
                      description: |-
                        Image is the fully qualified image reference without tag or digest.
                        Example: "docker.io/library/nginx", "registry.example.com/team/app"
                      minLength: 1
                      type: string
                    tag:
                      description: |-
                        Tag to pull. Mutually exclusive with Digest.
                        Example: "1.25-alpine", "v2.4.1"
                      type: string
                  required:
                  - image
                  type: object
                type: array
              nodeSelector:
                additionalProperties:
                  type: string
                description: |-
                  NodeSelector restricts which nodes to cache images on. Propagated to all child CachedImages.
                  Example: {"node-role.kubernetes.io/build": "true"}
                type: object
              policyRef:
                description: |-
                  PolicyRef references a PullPolicy for pacing controls. Propagated to all child CachedImages.
                  Example: {name: "conservative"}
                properties:
                  name:
                    description: Name of the PullPolicy resource.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              tolerations:
                description: |-
                  Tolerations for tainted nodes. Propagated to all child CachedImages.
                  Example: [{key: "node-role.kubernetes.io/build", operator: "Exists", effect: "NoSchedule"}]
                items:
                  description: |-
                    The pod this Toleration is attached to tolerates any taint that matches
                    the triple <key,value,effect> using the matching operator <operator>.
                  properties:
                    effect:
                      description: |-
                        Effect indicates the taint effect to match. Empty means match all taint effects.
                        When specified, allowed values are NoSchedule, PreferNoSchedule and NoExecute.
                      type: string
                    key:
                      description: |-
                        Key is the taint key that the toleration applies to. Empty means match all taint keys.
                        If the key is empty, operator must be Exists; this combination means to match all values and all keys.
                      type: string
                    operator:
                      description: |-
                        Operator represents a key's relationship to the value.
                        Valid operators are Exists, Equal, Lt, and Gt. Defaults to Equal.
                        Exists is equivalent to wildcard for value, so that a pod can
                        tolerate all taints of a particular category.
                        Lt and Gt perform numeric comparisons (requires feature gate TaintTolerationComparisonOperators).
                      type: string
                    tolerationSeconds:
                      description: |-
                        TolerationSeconds represents the period of time the toleration (which must be
                        of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default,
                        it is not set, which means tolerate the taint forever (do not evict). Zero and
                        negative values will be treated as 0 (evict immediately) by the system.
                      format: int64
                      type: integer
                    value:
                      description: |-
                        Value is the taint value the toleration matches to.
                        If the operator is Exists, the value should be empty, otherwise just a regular string.
                      type: string
                  type: object
                type: array
            type: object
          status:
            description: CachedImageSetStatus defines the observed state of CachedImageSet.
            properties:
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              imagesManaged:
                description: ImagesManaged is the number of CachedImage children managed
                  by this set.
                format: int32
                type: integer
              imagesReady:
                description: ImagesReady is the number of children in Ready phase.
                format: int32
                type: integer
              observedGeneration:
                description: ObservedGeneration is the last generation reconciled.
                format: int64
                type: integer
              phase:
                description: Phase summarizes the overall state.
                enum:
                - Pending
                - Ready
                - Degraded
                type: string
            type: object
        type: object
    served: true
    storage: true
