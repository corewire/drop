apiVersion: drop.corewire.io/v1alpha1
kind: DiscoveryPolicy
metadata:
  name: registry-discovery
spec:
  sources:
    - type: registry
      registry:
        url: "https://registry.example.com"
        repositories:
          - "myorg/myapp"
          - "myorg/worker"
        topX: 5
  syncInterval: 5m
  maxImages: 20
