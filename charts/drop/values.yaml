# Default values for drop.
replicaCount: 1

image:
  repository: ghcr.io/breee/drop
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to Chart appVersion

serviceAccount:
  create: true
  annotations: {}
  name: ""

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

leaderElection:
  enabled: true

metrics:
  enabled: true
  secureServing: true

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: ""
  additionalLabels: {}

# cert-manager integration for metrics TLS certificates.
# Assumes cert-manager is installed in the cluster.
certManager:
  enabled: false
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer

# CRD management. Set install to false when using the separate drop-crds chart.
crds:
  install: true

nodeSelector: {}
tolerations: []
affinity: {}
