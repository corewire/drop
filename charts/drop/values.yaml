# Default values for drop.
replicaCount: 1

image:
  repository: ghcr.io/breee/drop
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to Chart appVersion

serviceAccount:
  create: true
  annotations: {}
  name: ""

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

leaderElection:
  enabled: true

metrics:
  enabled: true
  secureServing: true

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: ""
  additionalLabels: {}

# cert-manager integration for metrics TLS certificates.
# Assumes cert-manager is installed in the cluster.
certManager:
  enabled: false
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer

nodeSelector: {}
tolerations: []
affinity: {}

# Drop Control Center UI
ui:
  # Set to true to deploy the Drop Control Center UI alongside the operator.
  enabled: false
  image:
    repository: ghcr.io/breee/drop-ui
    pullPolicy: IfNotPresent
    tag: ""  # Defaults to Chart appVersion
  # Port the UI container listens on.
  port: 8888
  # How often the UI polls Kubernetes for live SSE updates.
  pollInterval: 10s
  service:
    type: ClusterIP
    port: 8888
    # nodePort: 30888  # Uncomment when type=NodePort
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 10m
      memory: 32Mi
