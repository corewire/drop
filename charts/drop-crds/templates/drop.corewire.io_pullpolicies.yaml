{{- if .Values.install }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: pullpolicies.drop.corewire.io
spec:
  group: drop.corewire.io
  names:
    categories:
    - drop
    kind: PullPolicy
    listKind: PullPolicyList
    plural: pullpolicies
    singular: pullpolicy
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.maxConcurrentNodes
      name: MaxNodes
      type: integer
    - jsonPath: .spec.minDelayBetweenPulls
      name: MinDelay
      type: string
    - jsonPath: .spec.repullInterval
      name: RepullInterval
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PullPolicy is the Schema for the pullpolicies API.
          It is a configuration-only resource with no status.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PullPolicySpec defines pacing and behavior configuration
              for image pulls.
            properties:
              failureBackoff:
                description: FailureBackoff configures retry delays on pull failures.
                properties:
                  initial:
                    default: 30s
                    description: Initial delay before first retry.
                    type: string
                  max:
                    default: 5m
                    description: Max delay cap for exponential backoff.
                    type: string
                type: object
              maxConcurrentNodes:
                default: 1
                description: MaxConcurrentNodes is the max nodes pulling simultaneously
                  for this policy.
                format: int32
                minimum: 1
                type: integer
              minDelayBetweenPulls:
                default: 10s
                description: MinDelayBetweenPulls is the minimum time between starting
                  pulls on different nodes.
                type: string
              nodeSelector:
                additionalProperties:
                  type: string
                description: NodeSelector scopes this policy to a specific node pool.
                type: object
              repullInterval:
                description: RepullInterval is how often to re-pull cached images.
                  Zero or unset means never re-pull.
                type: string
              tolerations:
                description: Tolerations match tainted nodes in the pool.
                items:
                  description: |-
                    The pod this Toleration is attached to tolerates any taint that matches
                    the triple <key,value,effect> using the matching operator <operator>.
                  properties:
                    effect:
                      description: |-
                        Effect indicates the taint effect to match. Empty means match all taint effects.
                        When specified, allowed values are NoSchedule, PreferNoSchedule and NoExecute.
                      type: string
                    key:
                      description: |-
                        Key is the taint key that the toleration applies to. Empty means match all taint keys.
                        If the key is empty, operator must be Exists; this combination means to match all values and all keys.
                      type: string
                    operator:
                      description: |-
                        Operator represents a key's relationship to the value.
                        Valid operators are Exists, Equal, Lt, and Gt. Defaults to Equal.
                        Exists is equivalent to wildcard for value, so that a pod can
                        tolerate all taints of a particular category.
                        Lt and Gt perform numeric comparisons (requires feature gate TaintTolerationComparisonOperators).
                      type: string
                    tolerationSeconds:
                      description: |-
                        TolerationSeconds represents the period of time the toleration (which must be
                        of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default,
                        it is not set, which means tolerate the taint forever (do not evict). Zero and
                        negative values will be treated as 0 (evict immediately) by the system.
                      format: int64
                      type: integer
                    value:
                      description: |-
                        Value is the taint value the toleration matches to.
                        If the operator is Exists, the value should be empty, otherwise just a regular string.
                      type: string
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
{{- end }}
