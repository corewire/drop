{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "puller.fullname" . }}-metrics
  labels:
    {{- include "puller.labels" . | nindent 4 }}
spec:
  ports:
    - name: https-metrics
      port: 8443
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "puller.selectorLabels" . | nindent 4 }}
{{- end }}
