<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <!-- Background -->
  <rect width="720" height="720" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="360" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">Aggregation Methods</text>
  <text x="360" y="42" text-anchor="middle" font-size="11" fill="#666">How range query data points are combined into a single score (example values: 2, 5, 3, 7, 4, 6)</text>

  <!-- ===== nil (not set) — last value ===== -->
  <g transform="translate(20, 60)">
    <text x="160" y="12" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">not set (nil) — last value used directly</text>

    <!-- Mini axes -->
    <line x1="30" y1="110" x2="310" y2="110" stroke="#999" stroke-width="1"/>
    <line x1="30" y1="20" x2="30" y2="110" stroke="#999" stroke-width="1"/>

    <!-- Vertical lines at each data point -->
    <g stroke="#7209b7" stroke-width="0.8" stroke-opacity="0.2">
      <line x1="55" y1="20" x2="55" y2="110"/>
      <line x1="105" y1="20" x2="105" y2="110"/>
      <line x1="155" y1="20" x2="155" y2="110"/>
      <line x1="205" y1="20" x2="205" y2="110"/>
      <line x1="255" y1="20" x2="255" y2="110"/>
      <line x1="305" y1="20" x2="305" y2="110"/>
    </g>

    <!-- Data line (dashed, greyed out) -->
    <polyline points="55,92 105,65 155,83 205,47 255,74 305,56"
      fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,2" stroke-linejoin="round"/>

    <!-- All points grey except last -->
    <g fill="#ddd" stroke="#ccc" stroke-width="1">
      <circle cx="55" cy="92" r="3"/>
      <circle cx="105" cy="65" r="3"/>
      <circle cx="155" cy="83" r="3"/>
      <circle cx="205" cy="47" r="3"/>
      <circle cx="255" cy="74" r="3"/>
    </g>
    <!-- Greyed value labels -->
    <g font-size="9" fill="#bbb" text-anchor="middle">
      <text x="55" y="105">2</text>
      <text x="105" y="58">5</text>
      <text x="155" y="96">3</text>
      <text x="205" y="40">7</text>
      <text x="255" y="87">4</text>
    </g>

    <!-- Vertical drop from last point -->
    <line x1="305" y1="56" x2="305" y2="110" stroke="#7209b7" stroke-width="1.5" stroke-dasharray="3,2"/>

    <!-- Shaded column at last point -->
    <rect x="295" y="56" width="20" height="54" fill="#7209b7" fill-opacity="0.1"/>

    <!-- Last point highlighted -->
    <circle cx="305" cy="56" r="7" fill="#7209b7" fill-opacity="0.2" stroke="#7209b7" stroke-width="2"/>
    <circle cx="305" cy="56" r="3" fill="#7209b7"/>
    <text x="305" y="46" text-anchor="middle" font-size="10" fill="#7209b7" font-weight="bold">6</text>

    <!-- Score -->
    <rect x="220" y="118" width="100" height="18" fill="#7209b7" fill-opacity="0.08" rx="3"/>
    <text x="270" y="131" text-anchor="middle" font-size="10" fill="#7209b7" font-weight="bold">score = 6</text>
  </g>

  <!-- ===== sum ===== -->
  <g transform="translate(370, 60)">
    <text x="160" y="12" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">sum — total of all values</text>

    <!-- Mini axes -->
    <line x1="30" y1="110" x2="310" y2="110" stroke="#999" stroke-width="1"/>
    <line x1="30" y1="20" x2="30" y2="110" stroke="#999" stroke-width="1"/>

    <!-- Vertical lines at each data point -->
    <g stroke="#4361ee" stroke-width="0.8" stroke-opacity="0.2">
      <line x1="55" y1="20" x2="55" y2="110"/>
      <line x1="105" y1="20" x2="105" y2="110"/>
      <line x1="155" y1="20" x2="155" y2="110"/>
      <line x1="205" y1="20" x2="205" y2="110"/>
      <line x1="255" y1="20" x2="255" y2="110"/>
      <line x1="305" y1="20" x2="305" y2="110"/>
    </g>

    <!-- Shaded area under curve -->
    <polygon points="55,92 105,65 155,83 205,47 255,74 305,56 305,110 55,110"
      fill="#4361ee" fill-opacity="0.18"/>

    <!-- Vertical drop lines -->
    <g stroke="#4361ee" stroke-width="1" stroke-dasharray="3,2" stroke-opacity="0.5">
      <line x1="55" y1="92" x2="55" y2="110"/>
      <line x1="105" y1="65" x2="105" y2="110"/>
      <line x1="155" y1="83" x2="155" y2="110"/>
      <line x1="205" y1="47" x2="205" y2="110"/>
      <line x1="255" y1="74" x2="255" y2="110"/>
      <line x1="305" y1="56" x2="305" y2="110"/>
    </g>

    <!-- Data line -->
    <polyline points="55,92 105,65 155,83 205,47 255,74 305,56"
      fill="none" stroke="#4361ee" stroke-width="2" stroke-linejoin="round"/>

    <!-- Points -->
    <g fill="#4361ee">
      <circle cx="55" cy="92" r="3"/>
      <circle cx="105" cy="65" r="3"/>
      <circle cx="155" cy="83" r="3"/>
      <circle cx="205" cy="47" r="3"/>
      <circle cx="255" cy="74" r="3"/>
      <circle cx="305" cy="56" r="3"/>
    </g>
    <!-- Value labels -->
    <g font-size="9" fill="#4361ee" text-anchor="middle" font-weight="bold">
      <text x="55" y="85">2</text>
      <text x="105" y="58">5</text>
      <text x="155" y="76">3</text>
      <text x="205" y="40">7</text>
      <text x="255" y="67">4</text>
      <text x="305" y="49">6</text>
    </g>

    <!-- Score -->
    <rect x="180" y="118" width="140" height="18" fill="#4361ee" fill-opacity="0.08" rx="3"/>
    <text x="250" y="131" text-anchor="middle" font-size="10" fill="#4361ee" font-weight="bold">score = 27 (2+5+3+7+4+6)</text>
  </g>

  <!-- ===== count ===== -->
  <g transform="translate(20, 220)">
    <text x="160" y="12" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">count — number of data points</text>

    <!-- Mini axes -->
    <line x1="30" y1="110" x2="310" y2="110" stroke="#999" stroke-width="1"/>
    <line x1="30" y1="20" x2="30" y2="110" stroke="#999" stroke-width="1"/>

    <!-- Vertical lines at each data point (prominent — these are what we're counting) -->
    <g stroke="#2ec4b6" stroke-width="2" stroke-opacity="0.4">
      <line x1="55" y1="20" x2="55" y2="110"/>
      <line x1="105" y1="20" x2="105" y2="110"/>
      <line x1="155" y1="20" x2="155" y2="110"/>
      <line x1="205" y1="20" x2="205" y2="110"/>
      <line x1="255" y1="20" x2="255" y2="110"/>
      <line x1="305" y1="20" x2="305" y2="110"/>
    </g>

    <!-- Shaded columns at each point -->
    <g fill="#2ec4b6" fill-opacity="0.1">
      <rect x="45" y="20" width="20" height="90"/>
      <rect x="95" y="20" width="20" height="90"/>
      <rect x="145" y="20" width="20" height="90"/>
      <rect x="195" y="20" width="20" height="90"/>
      <rect x="245" y="20" width="20" height="90"/>
      <rect x="295" y="20" width="20" height="90"/>
    </g>

    <!-- Data line -->
    <polyline points="55,92 105,65 155,83 205,47 255,74 305,56"
      fill="none" stroke="#2ec4b6" stroke-width="2" stroke-linejoin="round"/>

    <!-- Points with count badges -->
    <g>
      <circle cx="55" cy="92" r="10" fill="#2ec4b6" fill-opacity="0.2" stroke="#2ec4b6" stroke-width="1.5"/>
      <circle cx="105" cy="65" r="10" fill="#2ec4b6" fill-opacity="0.2" stroke="#2ec4b6" stroke-width="1.5"/>
      <circle cx="155" cy="83" r="10" fill="#2ec4b6" fill-opacity="0.2" stroke="#2ec4b6" stroke-width="1.5"/>
      <circle cx="205" cy="47" r="10" fill="#2ec4b6" fill-opacity="0.2" stroke="#2ec4b6" stroke-width="1.5"/>
      <circle cx="255" cy="74" r="10" fill="#2ec4b6" fill-opacity="0.2" stroke="#2ec4b6" stroke-width="1.5"/>
      <circle cx="305" cy="56" r="10" fill="#2ec4b6" fill-opacity="0.2" stroke="#2ec4b6" stroke-width="1.5"/>
    </g>
    <!-- Count numbers on points -->
    <g font-size="9" fill="#2ec4b6" text-anchor="middle" font-weight="bold">
      <text x="55" y="96">①</text>
      <text x="105" y="69">②</text>
      <text x="155" y="87">③</text>
      <text x="205" y="51">④</text>
      <text x="255" y="78">⑤</text>
      <text x="305" y="60">⑥</text>
    </g>

    <!-- Score -->
    <rect x="175" y="118" width="145" height="18" fill="#2ec4b6" fill-opacity="0.08" rx="3"/>
    <text x="248" y="131" text-anchor="middle" font-size="10" fill="#2ec4b6" font-weight="bold">score = 6 (6 data points)</text>
  </g>

  <!-- ===== avg ===== -->
  <g transform="translate(370, 220)">
    <text x="160" y="12" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">avg — arithmetic mean</text>

    <!-- Mini axes -->
    <line x1="30" y1="110" x2="310" y2="110" stroke="#999" stroke-width="1"/>
    <line x1="30" y1="20" x2="30" y2="110" stroke="#999" stroke-width="1"/>

    <!-- Vertical lines at each data point -->
    <g stroke="#f77f00" stroke-width="0.8" stroke-opacity="0.2">
      <line x1="55" y1="20" x2="55" y2="110"/>
      <line x1="105" y1="20" x2="105" y2="110"/>
      <line x1="155" y1="20" x2="155" y2="110"/>
      <line x1="205" y1="20" x2="205" y2="110"/>
      <line x1="255" y1="20" x2="255" y2="110"/>
      <line x1="305" y1="20" x2="305" y2="110"/>
    </g>

    <!-- Shaded area between avg line and zero -->
    <rect x="55" y="69" width="250" height="41" fill="#f77f00" fill-opacity="0.1"/>

    <!-- Vertical drop lines -->
    <g stroke="#f77f00" stroke-width="1" stroke-dasharray="3,2" stroke-opacity="0.4">
      <line x1="55" y1="92" x2="55" y2="110"/>
      <line x1="105" y1="65" x2="105" y2="110"/>
      <line x1="155" y1="83" x2="155" y2="110"/>
      <line x1="205" y1="47" x2="205" y2="110"/>
      <line x1="255" y1="74" x2="255" y2="110"/>
      <line x1="305" y1="56" x2="305" y2="110"/>
    </g>

    <!-- Data line -->
    <polyline points="55,92 105,65 155,83 205,47 255,74 305,56"
      fill="none" stroke="#f77f00" stroke-width="2" stroke-linejoin="round"/>

    <!-- Points -->
    <g fill="#f77f00">
      <circle cx="55" cy="92" r="3"/>
      <circle cx="105" cy="65" r="3"/>
      <circle cx="155" cy="83" r="3"/>
      <circle cx="205" cy="47" r="3"/>
      <circle cx="255" cy="74" r="3"/>
      <circle cx="305" cy="56" r="3"/>
    </g>
    <!-- Value labels -->
    <g font-size="9" fill="#f77f00" text-anchor="middle" font-weight="bold">
      <text x="55" y="85">2</text>
      <text x="105" y="58">5</text>
      <text x="155" y="76">3</text>
      <text x="205" y="40">7</text>
      <text x="255" y="67">4</text>
      <text x="305" y="49">6</text>
    </g>

    <!-- Average line (prominent horizontal) -->
    <line x1="30" y1="69" x2="310" y2="69" stroke="#f77f00" stroke-width="2.5" stroke-dasharray="8,3"/>
    <text x="320" y="72" font-size="9" fill="#f77f00" font-weight="bold">4.5</text>

    <!-- Score -->
    <rect x="175" y="118" width="140" height="18" fill="#f77f00" fill-opacity="0.08" rx="3"/>
    <text x="245" y="131" text-anchor="middle" font-size="10" fill="#f77f00" font-weight="bold">score = 4.5 (27 ÷ 6)</text>
  </g>

  <!-- ===== max ===== -->
  <g transform="translate(195, 380)">
    <text x="160" y="12" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">max — highest single value</text>

    <!-- Mini axes -->
    <line x1="30" y1="110" x2="310" y2="110" stroke="#999" stroke-width="1"/>
    <line x1="30" y1="20" x2="30" y2="110" stroke="#999" stroke-width="1"/>

    <!-- Vertical lines at each data point -->
    <g stroke="#d62828" stroke-width="0.8" stroke-opacity="0.2">
      <line x1="55" y1="20" x2="55" y2="110"/>
      <line x1="105" y1="20" x2="105" y2="110"/>
      <line x1="155" y1="20" x2="155" y2="110"/>
      <line x1="205" y1="20" x2="205" y2="110"/>
      <line x1="255" y1="20" x2="255" y2="110"/>
      <line x1="305" y1="20" x2="305" y2="110"/>
    </g>

    <!-- Shaded column at max point -->
    <rect x="195" y="47" width="20" height="63" fill="#d62828" fill-opacity="0.15"/>

    <!-- Vertical drop from max point -->
    <line x1="205" y1="47" x2="205" y2="110" stroke="#d62828" stroke-width="2" stroke-dasharray="3,2"/>

    <!-- Data line -->
    <polyline points="55,92 105,65 155,83 205,47 255,74 305,56"
      fill="none" stroke="#d62828" stroke-width="2" stroke-linejoin="round"/>

    <!-- Points (all grey except max) -->
    <g fill="#ddd" stroke="#ccc" stroke-width="1">
      <circle cx="55" cy="92" r="3"/>
      <circle cx="105" cy="65" r="3"/>
      <circle cx="155" cy="83" r="3"/>
      <circle cx="255" cy="74" r="3"/>
      <circle cx="305" cy="56" r="3"/>
    </g>
    <!-- Greyed value labels -->
    <g font-size="9" fill="#bbb" text-anchor="middle">
      <text x="55" y="105">2</text>
      <text x="105" y="58">5</text>
      <text x="155" y="96">3</text>
      <text x="255" y="87">4</text>
      <text x="305" y="49">6</text>
    </g>

    <!-- Max point highlighted -->
    <circle cx="205" cy="47" r="9" fill="#d62828" fill-opacity="0.2" stroke="#d62828" stroke-width="2.5"/>
    <circle cx="205" cy="47" r="4" fill="#d62828"/>
    <text x="205" y="37" text-anchor="middle" font-size="11" fill="#d62828" font-weight="bold">7</text>

    <!-- Max horizontal reference line -->
    <line x1="30" y1="47" x2="310" y2="47" stroke="#d62828" stroke-width="1.5" stroke-dasharray="4,3"/>

    <!-- Score -->
    <rect x="175" y="118" width="145" height="18" fill="#d62828" fill-opacity="0.08" rx="3"/>
    <text x="248" y="131" text-anchor="middle" font-size="10" fill="#d62828" font-weight="bold">score = 7 (peak value)</text>
  </g>

  <!-- Legend at bottom -->
  <g transform="translate(50, 540)">
    <rect x="0" y="0" width="620" height="160" fill="#fff" rx="6" stroke="#e0e0e0" stroke-width="1"/>
    <text x="310" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Summary — same data, different scores</text>
    <text x="310" y="38" text-anchor="middle" font-size="10" fill="#666">Input: 6 data points with values [2, 5, 3, 7, 4, 6] from a range query over 30m (step=5m)</text>

    <g transform="translate(30, 55)">
      <rect x="0" y="-4" width="12" height="12" fill="#7209b7" fill-opacity="0.3" rx="2"/>
      <text x="18" y="6" font-size="11" fill="#333"><tspan font-weight="bold">not set (nil):</tspan> score = 6 — uses last value directly (PromQL handles aggregation)</text>
    </g>
    <g transform="translate(30, 77)">
      <rect x="0" y="-4" width="12" height="12" fill="#4361ee" fill-opacity="0.3" rx="2"/>
      <text x="18" y="6" font-size="11" fill="#333"><tspan font-weight="bold">sum:</tspan> score = 27 — total accumulated value (2+5+3+7+4+6)</text>
    </g>
    <g transform="translate(30, 99)">
      <rect x="0" y="-4" width="12" height="12" fill="#2ec4b6" fill-opacity="0.3" rx="2"/>
      <text x="18" y="6" font-size="11" fill="#333"><tspan font-weight="bold">count:</tspan> score = 6 — number of data points returned by Prometheus</text>
    </g>
    <g transform="translate(30, 121)">
      <rect x="0" y="-4" width="12" height="12" fill="#f77f00" fill-opacity="0.3" rx="2"/>
      <text x="18" y="6" font-size="11" fill="#333"><tspan font-weight="bold">avg:</tspan> score = 4.5 — arithmetic mean (27 ÷ 6)</text>
    </g>
    <g transform="translate(30, 143)">
      <rect x="0" y="-4" width="12" height="12" fill="#d62828" fill-opacity="0.3" rx="2"/>
      <text x="18" y="6" font-size="11" fill="#333"><tspan font-weight="bold">max:</tspan> score = 7 — highest single observation in the window</text>
    </g>
  </g>
</svg>
