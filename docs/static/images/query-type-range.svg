<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 310" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <!-- Background -->
  <rect width="620" height="310" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="310" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">queryType: range</text>
  <text x="310" y="42" text-anchor="middle" font-size="11" fill="#666">Uses /api/v1/query_range — returns multiple data points over a time window</text>

  <!-- Axes -->
  <line x1="70" y1="230" x2="570" y2="230" stroke="#999" stroke-width="1.5"/>
  <line x1="70" y1="60" x2="70" y2="230" stroke="#999" stroke-width="1.5"/>

  <!-- Y-axis label -->
  <text x="20" y="145" text-anchor="middle" font-size="11" fill="#666" transform="rotate(-90 20 145)">metric value</text>

  <!-- Y-axis tick labels -->
  <text x="60" y="234" text-anchor="end" font-size="9" fill="#999">0</text>
  <text x="60" y="188" text-anchor="end" font-size="9" fill="#999">50</text>
  <text x="60" y="145" text-anchor="end" font-size="9" fill="#999">100</text>
  <text x="60" y="103" text-anchor="end" font-size="9" fill="#999">150</text>
  <text x="60" y="68" text-anchor="end" font-size="9" fill="#999">200</text>

  <!-- Y-axis grid lines -->
  <g stroke="#eee" stroke-width="0.5">
    <line x1="70" y1="185" x2="570" y2="185"/>
    <line x1="70" y1="142" x2="570" y2="142"/>
    <line x1="70" y1="100" x2="570" y2="100"/>
    <line x1="70" y1="65" x2="570" y2="65"/>
  </g>

  <!-- Step vertical lines (prominent) -->
  <g stroke="#4361ee" stroke-width="1" stroke-opacity="0.25">
    <line x1="120" y1="60" x2="120" y2="230"/>
    <line x1="170" y1="60" x2="170" y2="230"/>
    <line x1="220" y1="60" x2="220" y2="230"/>
    <line x1="270" y1="60" x2="270" y2="230"/>
    <line x1="320" y1="60" x2="320" y2="230"/>
    <line x1="370" y1="60" x2="370" y2="230"/>
    <line x1="420" y1="60" x2="420" y2="230"/>
    <line x1="470" y1="60" x2="470" y2="230"/>
    <line x1="520" y1="60" x2="520" y2="230"/>
    <line x1="570" y1="60" x2="570" y2="230"/>
  </g>

  <!-- Step labels on x-axis -->
  <g font-size="8" fill="#999" text-anchor="middle">
    <text x="120" y="242">t₁</text>
    <text x="170" y="242">t₂</text>
    <text x="220" y="242">t₃</text>
    <text x="270" y="242">t₄</text>
    <text x="320" y="242">t₅</text>
    <text x="370" y="242">t₆</text>
    <text x="420" y="242">t₇</text>
    <text x="470" y="242">t₈</text>
    <text x="520" y="242">t₉</text>
    <text x="570" y="242">t₁₀</text>
  </g>

  <!-- Shaded area under the curve -->
  <polygon points="120,190 170,170 220,140 270,155 320,110 370,120 420,95 470,130 520,105 570,115 570,230 120,230"
    fill="#4361ee" fill-opacity="0.12"/>

  <!-- Vertical drop lines from points to x-axis -->
  <g stroke="#4361ee" stroke-width="1" stroke-dasharray="3,2" stroke-opacity="0.5">
    <line x1="120" y1="190" x2="120" y2="230"/>
    <line x1="170" y1="170" x2="170" y2="230"/>
    <line x1="220" y1="140" x2="220" y2="230"/>
    <line x1="270" y1="155" x2="270" y2="230"/>
    <line x1="320" y1="110" x2="320" y2="230"/>
    <line x1="370" y1="120" x2="370" y2="230"/>
    <line x1="420" y1="95" x2="420" y2="230"/>
    <line x1="470" y1="130" x2="470" y2="230"/>
    <line x1="520" y1="105" x2="520" y2="230"/>
    <line x1="570" y1="115" x2="570" y2="230"/>
  </g>

  <!-- Data line -->
  <polyline points="120,190 170,170 220,140 270,155 320,110 370,120 420,95 470,130 520,105 570,115"
    fill="none" stroke="#4361ee" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Data points with value labels -->
  <g fill="#4361ee">
    <circle cx="120" cy="190" r="4"/>
    <circle cx="170" cy="170" r="4"/>
    <circle cx="220" cy="140" r="4"/>
    <circle cx="270" cy="155" r="4"/>
    <circle cx="320" cy="110" r="4"/>
    <circle cx="370" cy="120" r="4"/>
    <circle cx="420" cy="95" r="4"/>
    <circle cx="470" cy="130" r="4"/>
    <circle cx="520" cy="105" r="4"/>
    <circle cx="570" cy="115" r="4"/>
  </g>
  <!-- Explicit value labels above each point -->
  <g font-size="9" fill="#4361ee" text-anchor="middle" font-weight="bold">
    <text x="120" y="182">47</text>
    <text x="170" y="162">70</text>
    <text x="220" y="132">105</text>
    <text x="270" y="147">88</text>
    <text x="320" y="102">140</text>
    <text x="370" y="112">128</text>
    <text x="420" y="87">158</text>
    <text x="470" y="122">117</text>
    <text x="520" y="97">146</text>
    <text x="570" y="107">134</text>
  </g>

  <!-- Lookback window annotation -->
  <line x1="120" y1="253" x2="570" y2="253" stroke="#4361ee" stroke-width="2"/>
  <line x1="120" y1="249" x2="120" y2="257" stroke="#4361ee" stroke-width="2"/>
  <line x1="570" y1="249" x2="570" y2="257" stroke="#4361ee" stroke-width="2"/>
  <text x="345" y="270" text-anchor="middle" font-size="10" fill="#4361ee" font-weight="bold">← lookback window (e.g. 168h) →</text>
  <text x="345" y="283" text-anchor="middle" font-size="9" fill="#999">each vertical line = one step interval (e.g. 5m)</text>

  <!-- Annotation: aggregated -->
  <rect x="400" y="60" width="175" height="30" fill="#4361ee" fill-opacity="0.1" rx="4" stroke="#4361ee" stroke-width="1"/>
  <text x="488" y="79" text-anchor="middle" font-size="10" fill="#4361ee" font-weight="bold">all 10 values → score</text>

  <!-- Example calculation -->
  <rect x="90" y="290" width="440" height="16" fill="none"/>
  <text x="310" y="302" text-anchor="middle" font-size="9" fill="#666">Example: sum → 47+70+105+88+140+128+158+117+146+134 = 1133</text>
</svg>
