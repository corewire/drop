<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <!-- Background -->
  <rect width="600" height="280" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="300" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">queryType: range</text>
  <text x="300" y="42" text-anchor="middle" font-size="11" fill="#666">Uses /api/v1/query_range — returns multiple data points over a time window</text>

  <!-- Axes -->
  <line x1="70" y1="220" x2="560" y2="220" stroke="#ccc" stroke-width="1.5"/>
  <line x1="70" y1="60" x2="70" y2="220" stroke="#ccc" stroke-width="1.5"/>

  <!-- Y-axis label -->
  <text x="20" y="140" text-anchor="middle" font-size="11" fill="#666" transform="rotate(-90 20 140)">metric value</text>

  <!-- X-axis label -->
  <text x="315" y="245" text-anchor="middle" font-size="11" fill="#666">time</text>

  <!-- Lookback window annotation -->
  <line x1="90" y1="230" x2="540" y2="230" stroke="#4361ee" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="90" y1="226" x2="90" y2="234" stroke="#4361ee" stroke-width="2"/>
  <line x1="540" y1="226" x2="540" y2="234" stroke="#4361ee" stroke-width="2"/>
  <text x="315" y="258" text-anchor="middle" font-size="10" fill="#4361ee" font-weight="bold">← lookback window (e.g. 168h) →</text>

  <!-- Step markers -->
  <g stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="2,3">
    <line x1="140" y1="60" x2="140" y2="220"/>
    <line x1="190" y1="60" x2="190" y2="220"/>
    <line x1="240" y1="60" x2="240" y2="220"/>
    <line x1="290" y1="60" x2="290" y2="220"/>
    <line x1="340" y1="60" x2="340" y2="220"/>
    <line x1="390" y1="60" x2="390" y2="220"/>
    <line x1="440" y1="60" x2="440" y2="220"/>
    <line x1="490" y1="60" x2="490" y2="220"/>
    <line x1="540" y1="60" x2="540" y2="220"/>
  </g>
  <text x="315" y="270" text-anchor="middle" font-size="9" fill="#999">each vertical line = one step interval</text>

  <!-- Data line -->
  <polyline points="90,180 140,160 190,130 240,145 290,100 340,110 390,85 440,120 490,95 540,105"
    fill="none" stroke="#4361ee" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Data points -->
  <g fill="#4361ee">
    <circle cx="90" cy="180" r="4"/>
    <circle cx="140" cy="160" r="4"/>
    <circle cx="190" cy="130" r="4"/>
    <circle cx="240" cy="145" r="4"/>
    <circle cx="290" cy="100" r="4"/>
    <circle cx="340" cy="110" r="4"/>
    <circle cx="390" cy="85" r="4"/>
    <circle cx="440" cy="120" r="4"/>
    <circle cx="490" cy="95" r="4"/>
    <circle cx="540" cy="105" r="4"/>
  </g>

  <!-- Annotation: aggregated -->
  <rect x="400" y="60" width="160" height="30" fill="#4361ee" fill-opacity="0.1" rx="4" stroke="#4361ee" stroke-width="1"/>
  <text x="480" y="79" text-anchor="middle" font-size="10" fill="#4361ee" font-weight="bold">→ aggregated into score</text>
</svg>
