<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 300" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <!-- Background -->
  <rect width="620" height="300" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="310" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">queryType: instant</text>
  <text x="310" y="42" text-anchor="middle" font-size="11" fill="#666">Uses /api/v1/query — returns a single point-in-time value</text>

  <!-- Axes -->
  <line x1="70" y1="230" x2="570" y2="230" stroke="#999" stroke-width="1.5"/>
  <line x1="70" y1="60" x2="70" y2="230" stroke="#999" stroke-width="1.5"/>

  <!-- Y-axis label -->
  <text x="20" y="145" text-anchor="middle" font-size="11" fill="#666" transform="rotate(-90 20 145)">metric value</text>

  <!-- Y-axis tick labels -->
  <text x="60" y="234" text-anchor="end" font-size="9" fill="#999">0</text>
  <text x="60" y="188" text-anchor="end" font-size="9" fill="#999">50</text>
  <text x="60" y="145" text-anchor="end" font-size="9" fill="#999">100</text>
  <text x="60" y="103" text-anchor="end" font-size="9" fill="#999">150</text>
  <text x="60" y="68" text-anchor="end" font-size="9" fill="#999">200</text>

  <!-- Y-axis grid lines -->
  <g stroke="#eee" stroke-width="0.5">
    <line x1="70" y1="185" x2="570" y2="185"/>
    <line x1="70" y1="142" x2="570" y2="142"/>
    <line x1="70" y1="100" x2="570" y2="100"/>
    <line x1="70" y1="65" x2="570" y2="65"/>
  </g>

  <!-- Greyed-out area (past data that instant query ignores) -->
  <rect x="70" y="60" width="480" height="170" fill="#f0f0f0" fill-opacity="0.5"/>
  <text x="310" y="200" text-anchor="middle" font-size="10" fill="#aaa" font-style="italic">ignored by instant query</text>

  <!-- Ghost data line (showing what range would see) -->
  <polyline points="120,190 170,170 220,140 270,155 320,110 370,120 420,95 470,130 520,105 550,115"
    fill="none" stroke="#ccc" stroke-width="1.5" stroke-dasharray="4,3" stroke-linejoin="round"/>

  <!-- Ghost points with faded values -->
  <g fill="#ddd">
    <circle cx="120" cy="190" r="3"/>
    <circle cx="170" cy="170" r="3"/>
    <circle cx="220" cy="140" r="3"/>
    <circle cx="270" cy="155" r="3"/>
    <circle cx="320" cy="110" r="3"/>
    <circle cx="370" cy="120" r="3"/>
    <circle cx="420" cy="95" r="3"/>
    <circle cx="470" cy="130" r="3"/>
    <circle cx="520" cy="105" r="3"/>
  </g>
  <g font-size="8" fill="#ccc" text-anchor="middle">
    <text x="120" y="184">47</text>
    <text x="170" y="164">70</text>
    <text x="220" y="134">105</text>
    <text x="270" y="149">88</text>
    <text x="320" y="104">140</text>
    <text x="370" y="114">128</text>
    <text x="420" y="89">158</text>
    <text x="470" y="124">117</text>
    <text x="520" y="99">146</text>
  </g>

  <!-- NOW vertical line (prominent) -->
  <line x1="550" y1="55" x2="550" y2="230" stroke="#e63946" stroke-width="2.5"/>
  <text x="550" y="52" text-anchor="middle" font-size="10" fill="#e63946" font-weight="bold">now</text>

  <!-- Shaded column at "now" -->
  <rect x="540" y="60" width="20" height="170" fill="#e63946" fill-opacity="0.08"/>

  <!-- Vertical drop line from instant point to x-axis -->
  <line x1="550" y1="115" x2="550" y2="230" stroke="#e63946" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Single instant point -->
  <circle cx="550" cy="115" r="10" fill="#e63946" fill-opacity="0.15" stroke="#e63946" stroke-width="2"/>
  <circle cx="550" cy="115" r="4" fill="#e63946"/>

  <!-- Value label on instant point -->
  <text x="550" y="103" text-anchor="middle" font-size="11" fill="#e63946" font-weight="bold">134</text>

  <!-- Annotation box -->
  <rect x="380" y="62" width="150" height="32" fill="#e63946" fill-opacity="0.1" rx="4" stroke="#e63946" stroke-width="1"/>
  <text x="455" y="76" text-anchor="middle" font-size="10" fill="#e63946" font-weight="bold">score = 134</text>
  <text x="455" y="89" text-anchor="middle" font-size="9" fill="#e63946">(single instant value)</text>

  <!-- Arrow from annotation to point -->
  <line x1="530" y1="78" x2="543" y2="108" stroke="#e63946" stroke-width="1.5"/>
  <polygon points="543,108 539,101 546,103" fill="#e63946"/>

  <!-- X-axis label -->
  <text x="310" y="250" text-anchor="middle" font-size="11" fill="#666">time</text>
  <text x="550" y="250" text-anchor="middle" font-size="9" fill="#e63946" font-weight="bold">query time</text>

  <!-- Example -->
  <text x="310" y="275" text-anchor="middle" font-size="9" fill="#666">Example: count(container_memory_working_set_bytes{namespace="build"}) by (image) → 134 running containers</text>
</svg>
