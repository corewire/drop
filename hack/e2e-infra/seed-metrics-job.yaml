apiVersion: batch/v1
kind: Job
metadata:
  name: seed-metrics
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: seed
          image: docker.io/library/busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              # Wait for Prometheus to be ready
              echo "Waiting for Prometheus..."
              for i in $(seq 1 30); do
                if wget -q -O /dev/null "http://prometheus.e2e-infra.svc.cluster.local:9090/-/ready" 2>/dev/null; then
                  echo "Prometheus is ready"
                  break
                fi
                sleep 2
              done

              # Verify recording rules are producing metrics
              echo "Waiting for seed metrics to be generated by recording rules..."
              for i in $(seq 1 30); do
                RESULT=$(wget -q -O - "http://prometheus.e2e-infra.svc.cluster.local:9090/api/v1/query?query=container_memory_working_set_bytes" 2>/dev/null || echo "")
                if echo "$RESULT" | grep -q "nginx"; then
                  echo "Seed metrics are available!"
                  echo "$RESULT" | head -c 500
                  exit 0
                fi
                sleep 2
              done
              echo "WARNING: Metrics may not be ready yet (rules take a few eval cycles)"
              exit 0
