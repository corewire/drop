apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: e2e-infra
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: drop-operator
        metrics_path: /metrics
        scheme: https
        tls_config:
          insecure_skip_verify: true
        authorization:
          type: Bearer
          credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        static_configs:
          - targets: ['drop-metrics.drop-system.svc.cluster.local:8443']

    rule_files:
      - /etc/prometheus/rules/*.yml
  # Recording rules that produce metrics with image labels (simulates real cluster data)
  seed-rules.yml: |
    groups:
      - name: seed_image_metrics
        interval: 10s
        rules:
          - record: container_memory_working_set_bytes
            labels:
              image: "docker.io/library/nginx:1.25-alpine"
              container: "nginx"
              namespace: "default"
              pod: "runner-abc123"
            expr: "104857600"
          - record: container_memory_working_set_bytes
            labels:
              image: "docker.io/library/redis:7-alpine"
              container: "redis"
              namespace: "default"
              pod: "runner-def456"
            expr: "52428800"
          - record: container_memory_working_set_bytes
            labels:
              image: "docker.io/library/alpine:3.19"
              container: "worker"
              namespace: "build-stuff"
              pod: "runner-ghi789"
            expr: "26214400"
          - record: container_memory_working_set_bytes
            labels:
              image: "docker.io/library/busybox:1.36"
              container: "init"
              namespace: "build-stuff"
              pod: "runner-jkl012"
            expr: "10485760"
          - record: container_memory_working_set_bytes
            labels:
              image: "registry.e2e-infra.svc.cluster.local:5000/test/myapp:v1"
              container: "app"
              namespace: "production"
              pod: "myapp-xyz"
            expr: "209715200"
      # Metrics for aggregation method e2e tests.
      # Two images with multiple pods each so count() and sum() produce
      # different rankings:
      #   alpine  → 3 pods, values 100+200+300 → sum=600, count=3, avg=200, max=300
      #   busybox → 1 pod,  value  500         → sum=500, count=1, avg=500, max=500
      # With count(), alpine ranks higher (3 > 1).
      # With sum(),   alpine still ranks higher (600 > 500).
      # With avg(),   busybox ranks higher (500 > 200).
      # With max(),   busybox ranks higher (500 > 300).
      - name: seed_aggregation_metrics
        interval: 10s
        rules:
          - record: container_cpu_usage_seconds_total
            labels:
              image: "docker.io/library/alpine:3.19"
              container: "worker"
              namespace: "aggregation-test"
              pod: "worker-aaa"
            expr: "100"
          - record: container_cpu_usage_seconds_total
            labels:
              image: "docker.io/library/alpine:3.19"
              container: "worker"
              namespace: "aggregation-test"
              pod: "worker-bbb"
            expr: "200"
          - record: container_cpu_usage_seconds_total
            labels:
              image: "docker.io/library/alpine:3.19"
              container: "worker"
              namespace: "aggregation-test"
              pod: "worker-ccc"
            expr: "300"
          - record: container_cpu_usage_seconds_total
            labels:
              image: "docker.io/library/busybox:1.36"
              container: "init"
              namespace: "aggregation-test"
              pod: "init-ddd"
            expr: "500"
