apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: e2e-infra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy-events
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy-events
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy-events
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: e2e-infra
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: e2e-infra
data:
  config.alloy: |
    // Tail real Kubernetes events from all namespaces and ship them to Loki.
    // log_format=json so the kubernetesEvents parser can extract name/reason/message.
    loki.source.kubernetes_events "events" {
      job_name   = "kubernetes-events"
      log_format = "json"
      forward_to = [loki.write.local.receiver]
    }

    // Tag every line with drop_e2e=true so discovery queries can scope to e2e data.
    loki.write "local" {
      external_labels = { drop_e2e = "true" }
      endpoint {
        url = "http://loki.e2e-infra.svc.cluster.local:3100/loki/api/v1/push"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  namespace: e2e-infra
  labels:
    app: alloy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      serviceAccountName: alloy
      containers:
        - name: alloy
          image: grafana/alloy:v1.7.5
          args:
            - run
            - /etc/alloy/config.alloy
            - --storage.path=/var/lib/alloy/data
          ports:
            - containerPort: 12345
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
            - name: data
              mountPath: /var/lib/alloy/data
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: alloy-config
        - name: data
          emptyDir: {}
