# Dev samples: deployed by Tilt for interactive testing
---
# === PullPolicy ===
apiVersion: drop.corewire.io/v1alpha1
kind: PullPolicy
metadata:
  name: dev-conservative
spec:
  maxConcurrentNodes: 1
  minDelayBetweenPulls: 5s
  repullInterval: 1h
  failureBackoff:
    initial: 30s
    max: 5m
---
# === CachedImage: healthy ===
apiVersion: drop.corewire.io/v1alpha1
kind: CachedImage
metadata:
  name: dev-nginx
spec:
  image: docker.io/library/nginx
  tag: "1.25-alpine"
  policyRef:
    name: dev-conservative
---
apiVersion: drop.corewire.io/v1alpha1
kind: CachedImage
metadata:
  name: dev-redis
spec:
  image: docker.io/library/redis
  tag: "7-alpine"
  policyRef:
    name: dev-conservative
---
# === CachedImage: broken (DNS failure → ImagePullBackOff) ===
apiVersion: drop.corewire.io/v1alpha1
kind: CachedImage
metadata:
  name: test-invalid-image
spec:
  image: registry.invalid.local:9999/does-not-exist
  tag: "nope"
  policyRef:
    name: dev-conservative
---
# === CachedImageSet: healthy (static images) ===
apiVersion: drop.corewire.io/v1alpha1
kind: CachedImageSet
metadata:
  name: dev-set
spec:
  policyRef:
    name: dev-conservative
  images:
    - image: docker.io/library/alpine
      tag: "3.19"
    - image: docker.io/library/busybox
      tag: "1.36"
---
# === CachedImageSet: dynamic (backed by DiscoveryPolicy) ===
apiVersion: drop.corewire.io/v1alpha1
kind: CachedImageSet
metadata:
  name: dev-set-discovered
spec:
  policyRef:
    name: dev-conservative
  discoveryPolicyRef:
    name: dev-prometheus
---
# === DiscoveryPolicy: Prometheus range query with total-usage signal ===
apiVersion: drop.corewire.io/v1alpha1
kind: DiscoveryPolicy
metadata:
  name: dev-prometheus
spec:
  queries:
    - name: runner-image-usage
      type: prometheus
      prometheus:
        endpoint: "http://prometheus.e2e-infra.svc.cluster.local:9090"
        queryType: range
        lookback: 24h
        step: 5m
        query: 'count(container_memory_working_set_bytes{container!="", container!="POD", namespace="build-stuff", pod=~"runner-.*"}) by (image)'
  signals:
    - name: total-usage
      queryRef: runner-image-usage
      type: aggregate
      aggregate:
        method: sum
  ranking:
    strategy: signal
    signal:
      signalRef: total-usage
  syncInterval: 30s
  maxImages: 10
---
# === DiscoveryPolicy: Prometheus with hybrid weightedSum ranking ===
apiVersion: drop.corewire.io/v1alpha1
kind: DiscoveryPolicy
metadata:
  name: dev-hybrid
spec:
  queries:
    - name: runner-image-usage
      type: prometheus
      prometheus:
        endpoint: "http://prometheus.e2e-infra.svc.cluster.local:9090"
        queryType: range
        lookback: 24h
        step: 5m
        query: 'count(container_memory_working_set_bytes{container!="", container!="POD", namespace="build-stuff"}) by (image)'
  signals:
    - name: total-usage
      queryRef: runner-image-usage
      type: aggregate
      aggregate:
        method: sum
    - name: peak-concurrency
      queryRef: runner-image-usage
      type: aggregate
      aggregate:
        method: max
  ranking:
    strategy: weightedSum
    weightedSum:
      normalize: minMax
      missingSignal: zero
      terms:
        - signalRef: total-usage
          weight: "700m"
        - signalRef: peak-concurrency
          weight: "300m"
  syncInterval: 30s
  maxImages: 10
---
# === DiscoveryPolicy: broken Prometheus endpoint (DNS error) ===
apiVersion: drop.corewire.io/v1alpha1
kind: DiscoveryPolicy
metadata:
  name: test-broken-prom
spec:
  queries:
    - name: broken-query
      type: prometheus
      prometheus:
        endpoint: "http://nonexistent-prometheus:9090"
        query: "up{}"
  signals:
    - name: total-usage
      queryRef: broken-query
      type: aggregate
      aggregate:
        method: sum
  ranking:
    strategy: signal
    signal:
      signalRef: total-usage
  syncInterval: 30m
  maxImages: 10
