# Dev samples: deployed by Tilt for interactive testing.
#
# These samples exercise EVERY feature of the operator so developers can spot
# regressions at a glance in the Tilt UI. They run against the e2e-infra stack
# (Prometheus, Loki, and a seeded OCI registry) that Tilt brings up.
#
# Feature coverage:
#   PullPolicy ............ dev-conservative
#   CachedImage .......... dev-nginx, dev-redis (healthy), test-invalid-image (broken)
#   CachedImageSet ....... dev-set (static), dev-set-discovered (discovery-backed)
#   Query: prometheus .... dev-prometheus (range), dev-prometheus-instant (instant)
#   Query: loki .......... dev-loki (kubernetesEvents parser)
#   Query: registry ...... dev-registry
#   Signal: aggregate .... dev-prometheus
#   Signal: timeWeighted . dev-timeweighted
#   Signal: windowAgg .... dev-window
#   Signal: eventPullTime  dev-loki
#   Ranking: signal ...... dev-prometheus
#   Ranking: weightedSum . dev-hybrid
#   Ranking: modelExposure dev-modelexposure
#   Failure cases ........ test-broken-prom, test-broken-registry, test-notfound-repo
---
# === PullPolicy ===
apiVersion: drop.corewire.io/v1alpha1
kind: PullPolicy
metadata:
  name: dev-conservative
spec:
  maxConcurrentNodes: 1
  minDelayBetweenPulls: 5s
  repullInterval: 1h
  failureBackoff:
    initial: 30s
    max: 5m
---
# === CachedImage: healthy ===
apiVersion: drop.corewire.io/v1alpha1
kind: CachedImage
metadata:
  name: dev-nginx
spec:
  image: docker.io/library/nginx
  tag: "1.25-alpine"
  policyRef:
    name: dev-conservative
---
apiVersion: drop.corewire.io/v1alpha1
kind: CachedImage
metadata:
  name: dev-redis
spec:
  image: docker.io/library/redis
  tag: "7-alpine"
  policyRef:
    name: dev-conservative
---
# === CachedImage: broken (DNS failure → ImagePullBackOff) ===
apiVersion: drop.corewire.io/v1alpha1
kind: CachedImage
metadata:
  name: test-invalid-image
spec:
  image: registry.invalid.local:9999/does-not-exist
  tag: "nope"
  policyRef:
    name: dev-conservative
---
# === CachedImageSet: healthy (static images) ===
apiVersion: drop.corewire.io/v1alpha1
kind: CachedImageSet
metadata:
  name: dev-set
spec:
  policyRef:
    name: dev-conservative
  images:
    - image: docker.io/library/alpine
      tag: "3.19"
    - image: docker.io/library/busybox
      tag: "1.36"
---
# === CachedImageSet: dynamic (backed by DiscoveryPolicy) ===
apiVersion: drop.corewire.io/v1alpha1
kind: CachedImageSet
metadata:
  name: dev-set-discovered
spec:
  policyRef:
    name: dev-conservative
  discoveryPolicyRef:
    name: dev-prometheus
---
# === DiscoveryPolicy: Prometheus range query with total-usage signal ===
apiVersion: drop.corewire.io/v1alpha1
kind: DiscoveryPolicy
metadata:
  name: dev-prometheus
spec:
  queries:
    - name: runner-image-usage
      type: prometheus
      prometheus:
        endpoint: "http://prometheus.e2e-infra.svc.cluster.local:9090"
        queryType: range
        lookback: 24h
        step: 5m
        query: 'count(container_memory_working_set_bytes{container!="", container!="POD", namespace="build-stuff", pod=~"runner-.*"}) by (image)'
  signals:
    - name: total-usage
      query: runner-image-usage
      type: aggregate
      aggregate:
        method: sum
  ranking:
    strategy: signal
    signal: total-usage
  syncInterval: 30s
  maxImages: 10
---
# === DiscoveryPolicy: Prometheus with hybrid weightedSum ranking ===
apiVersion: drop.corewire.io/v1alpha1
kind: DiscoveryPolicy
metadata:
  name: dev-hybrid
spec:
  queries:
    - name: runner-image-usage
      type: prometheus
      prometheus:
        endpoint: "http://prometheus.e2e-infra.svc.cluster.local:9090"
        queryType: range
        lookback: 24h
        step: 5m
        query: 'count(container_memory_working_set_bytes{container!="", container!="POD", namespace="build-stuff"}) by (image)'
  signals:
    - name: total-usage
      query: runner-image-usage
      type: aggregate
      aggregate:
        method: sum
    - name: peak-concurrency
      query: runner-image-usage
      type: aggregate
      aggregate:
        method: max
  ranking:
    strategy: weightedSum
    weightedSum:
      normalize: minMax
      missingSignal: zero
      terms:
        - signal: total-usage
          weight: "700m"
        - signal: peak-concurrency
          weight: "300m"
  syncInterval: 30s
  maxImages: 10
---
# === DiscoveryPolicy: Prometheus instant query ===
apiVersion: drop.corewire.io/v1alpha1
kind: DiscoveryPolicy
metadata:
  name: dev-prometheus-instant
spec:
  queries:
    - name: current-usage
      type: prometheus
      prometheus:
        endpoint: "http://prometheus.e2e-infra.svc.cluster.local:9090"
        queryType: instant
        query: 'container_memory_working_set_bytes{namespace="build-stuff"}'
  signals:
    - name: current
      query: current-usage
      type: aggregate
      aggregate:
        method: max
  ranking:
    strategy: signal
    signal: current
  syncInterval: 30s
  maxImages: 10
---
# === DiscoveryPolicy: timeWeightedAggregate signal ===
# Weights samples by hour-of-day before aggregating.
apiVersion: drop.corewire.io/v1alpha1
kind: DiscoveryPolicy
metadata:
  name: dev-timeweighted
spec:
  queries:
    - name: runner-image-usage
      type: prometheus
      prometheus:
        endpoint: "http://prometheus.e2e-infra.svc.cluster.local:9090"
        queryType: range
        lookback: 24h
        step: 5m
        query: 'count(container_memory_working_set_bytes{container!="", container!="POD", namespace="build-stuff"}) by (image)'
  signals:
    - name: business-hours-usage
      query: runner-image-usage
      type: timeWeightedAggregate
      timeWeightedAggregate:
        method: sum
        timezone: "UTC"
        defaultWeight: "1"
        windows:
          - startHour: 8
            endHour: 18
            weight: "2"
  ranking:
    strategy: signal
    signal: business-hours-usage
  syncInterval: 30s
  maxImages: 10
---
# === DiscoveryPolicy: windowAggregate signal (relative window) ===
apiVersion: drop.corewire.io/v1alpha1
kind: DiscoveryPolicy
metadata:
  name: dev-window
spec:
  queries:
    - name: runner-image-usage
      type: prometheus
      prometheus:
        endpoint: "http://prometheus.e2e-infra.svc.cluster.local:9090"
        queryType: range
        lookback: 24h
        step: 5m
        query: 'count(container_memory_working_set_bytes{container!="", container!="POD", namespace="build-stuff"}) by (image)'
  signals:
    - name: recent-usage
      query: runner-image-usage
      type: windowAggregate
      windowAggregate:
        method: sum
        relativeWindow: 6h
  ranking:
    strategy: signal
    signal: recent-usage
  syncInterval: 30s
  maxImages: 10
---
# === DiscoveryPolicy: Loki query + eventPullTime signals ===
apiVersion: drop.corewire.io/v1alpha1
kind: DiscoveryPolicy
metadata:
  name: dev-loki
spec:
  queries:
    - name: image-pull-events
      type: loki
      loki:
        endpoint: "http://loki.e2e-infra.svc.cluster.local:3100"
        queryType: range
        lookback: 24h
        query: '{job="kubernetes-events",drop_e2e="true"}'
        parser:
          type: kubernetesEvents
  signals:
    - name: p50-cold-pull-time
      query: image-pull-events
      type: eventPullTime
      eventPullTime:
        statistic: p50
        durationMode: messageDuration
        includeCacheHits: false
    - name: pull-failures
      query: image-pull-events
      type: eventPullTime
      eventPullTime:
        metric: failure
        statistic: count
        durationMode: messageDuration
        includeCacheHits: false
    - name: avg-image-size
      query: image-pull-events
      type: eventPullTime
      eventPullTime:
        metric: imageSize
        statistic: avg
        durationMode: messageDuration
        includeCacheHits: false
  ranking:
    strategy: signal
    signal: p50-cold-pull-time
  syncInterval: 30s
  maxImages: 10
---
# === DiscoveryPolicy: registry tag discovery ===
apiVersion: drop.corewire.io/v1alpha1
kind: DiscoveryPolicy
metadata:
  name: dev-registry
spec:
  queries:
    - name: registry-tags
      type: registry
      registry:
        url: "http://registry.e2e-infra.svc.cluster.local:5000"
        repositories:
          - test/myapp
          - test/worker
          - test/tools
        tagFilter: "^v"
        topX: 5
  signals:
    - name: tag-recency
      query: registry-tags
      type: aggregate
      aggregate:
        method: sum
  ranking:
    strategy: signal
    signal: tag-recency
  syncInterval: 30s
  maxImages: 20
---
# === DiscoveryPolicy: modelExposure ranking (multi-query) ===
# Combines Prometheus usage signals with a Loki pull-time signal.
apiVersion: drop.corewire.io/v1alpha1
kind: DiscoveryPolicy
metadata:
  name: dev-modelexposure
spec:
  queries:
    - name: runner-image-usage
      type: prometheus
      prometheus:
        endpoint: "http://prometheus.e2e-infra.svc.cluster.local:9090"
        queryType: range
        lookback: 24h
        step: 5m
        query: 'count(container_memory_working_set_bytes{container!="", container!="POD", namespace="build-stuff"}) by (image)'
    - name: image-pull-events
      type: loki
      loki:
        endpoint: "http://loki.e2e-infra.svc.cluster.local:3100"
        queryType: range
        lookback: 24h
        query: '{job="kubernetes-events",drop_e2e="true"}'
        parser:
          type: kubernetesEvents
  signals:
    - name: pre-usage
      query: runner-image-usage
      type: aggregate
      aggregate:
        method: sum
    - name: target-usage
      query: runner-image-usage
      type: aggregate
      aggregate:
        method: max
    - name: pull-time
      query: image-pull-events
      type: eventPullTime
      eventPullTime:
        statistic: p50
        durationMode: messageDuration
        includeCacheHits: false
  ranking:
    strategy: modelExposure
    modelExposure:
      nodeCount: 3
      preWindowUsageSignal: pre-usage
      targetWindowUsageSignal: target-usage
      pullTimeSignal: pull-time
  syncInterval: 30s
  maxImages: 10
---
# === DiscoveryPolicy: broken Prometheus endpoint (DNS error) ===
apiVersion: drop.corewire.io/v1alpha1
kind: DiscoveryPolicy
metadata:
  name: test-broken-prom
spec:
  queries:
    - name: broken-query
      type: prometheus
      prometheus:
        endpoint: "http://nonexistent-prometheus:9090"
        query: "up{}"
  signals:
    - name: total-usage
      query: broken-query
      type: aggregate
      aggregate:
        method: sum
  ranking:
    strategy: signal
    signal: total-usage
  syncInterval: 30m
  maxImages: 10
---
# === DiscoveryPolicy: broken registry endpoint (DNS error) ===
apiVersion: drop.corewire.io/v1alpha1
kind: DiscoveryPolicy
metadata:
  name: test-broken-registry
spec:
  queries:
    - name: broken-registry
      type: registry
      registry:
        url: "http://nonexistent-registry:5000"
        repositories:
          - test/app
  signals:
    - name: tag-recency
      query: broken-registry
      type: aggregate
      aggregate:
        method: sum
  ranking:
    strategy: signal
    signal: tag-recency
  syncInterval: 30m
  maxImages: 10
---
# === DiscoveryPolicy: registry repository not found (404) ===
apiVersion: drop.corewire.io/v1alpha1
kind: DiscoveryPolicy
metadata:
  name: test-notfound-repo
spec:
  queries:
    - name: missing-repo
      type: registry
      registry:
        url: "http://registry.e2e-infra.svc.cluster.local:5000"
        repositories:
          - test/does-not-exist
  signals:
    - name: tag-recency
      query: missing-repo
      type: aggregate
      aggregate:
        method: sum
  ranking:
    strategy: signal
    signal: tag-recency
  syncInterval: 30m
  maxImages: 10
