name: Release

on:
  push:
    tags:
      - "v*"
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump level"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean
      force:
        description: "Force release even without relevant changes"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for relevant changes since last tag
        id: changes
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          if [[ "${{ inputs.force }}" == "true" ]]; then
            echo "Force release requested — skipping change check."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -n "$LATEST_TAG" ]]; then
            CHANGED=$(git diff --name-only "$LATEST_TAG"..HEAD -- cmd/ internal/ api/ go.mod go.sum Dockerfile charts/)
            if [[ -z "$CHANGED" ]]; then
              echo "No relevant changes since $LATEST_TAG — skipping release."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Determine version
        id: version
        if: steps.changes.outputs.skip != 'true'
        run: |
          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            MAJOR=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f3)

            BUMP="${{ inputs.bump || 'patch' }}"
            case "$BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac

            VERSION="v${MAJOR}.${MINOR}.${PATCH}"

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$VERSION"
            git push origin "$VERSION"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v6
        if: steps.changes.outputs.skip != 'true'
        with:
          go-version-file: go.mod

      - name: Login to GHCR
        if: steps.changes.outputs.skip != 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.changes.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Install cosign
        if: steps.changes.outputs.skip != 'true'
        uses: sigstore/cosign-installer@v4.1.2

      - name: Docker meta
        if: steps.changes.outputs.skip != 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}

      - name: Build and push multi-arch image
        if: steps.changes.outputs.skip != 'true'
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compute lowercase image name
        if: steps.changes.outputs.skip != 'true'
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Sign image with cosign
        if: steps.changes.outputs.skip != 'true'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}"

      - name: Attest build provenance
        if: steps.changes.outputs.skip != 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Package and push Helm chart
        if: steps.changes.outputs.skip != 'true'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm package charts/drop --version "${VERSION#v}" --app-version "${VERSION#v}"
          helm push drop-*.tgz oci://ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/charts

      - name: Create GitHub Release
        if: steps.changes.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            $PRERELEASE_FLAG
