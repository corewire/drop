name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

# Each job maps to a local make target for easy debugging:
#   lint       → make lint
#   test       → make test
#   build      → make build
#   helm-lint  → make helm-lint && make helm-template
#   docs-build → make docs-build
#   e2e        → make e2e-local

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run tests
        run: make test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        run: make build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build Docker image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: drop:ci-build
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: azure/setup-helm@v5
      - name: Generate CRDs and sync into charts
        run: make sync-crds
      - name: Lint Helm charts
        run: |
          helm lint charts/drop
          helm lint charts/drop-crds
      - name: Template Helm charts
        run: |
          helm template drop charts/drop
          helm template drop-crds charts/drop-crds

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true
      - name: Build docs
        working-directory: docs
        run: |
          hugo mod get
          hugo --minify

  e2e:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
      - name: Create kind cluster
        run: make kind-create KIND=kind
      - name: Build and load image
        run: |
          make docker-build IMG=controller:ci
          make kind-load KIND=kind IMG=controller:ci
      - name: Install CRDs
        run: |
          make controller-gen
          make sync-crds
          kubectl apply -f config/crd/bases/
      - name: Deploy E2E infrastructure (Prometheus + Registry)
        run: make e2e-infra
      - name: Deploy operator
        run: |
          helm install drop charts/drop \
            --namespace drop-system \
            --create-namespace \
            --skip-crds \
            --set crds.install=false \
            --set image.repository=controller \
            --set image.tag=ci \
            --set image.pullPolicy=Never \
            --set leaderElection.enabled=false \
            --set metrics.enabled=true \
            --set metrics.secureServing=false \
            --wait --timeout 120s
      - name: Run E2E tests
        run: make test-e2e
