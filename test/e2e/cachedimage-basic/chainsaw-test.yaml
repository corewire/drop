# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: cachedimage-basic
spec:
  description: |
    Verify that creating a CachedImage resource causes the operator to create
    a puller Pod on a target node, and that status transitions to Ready on success.
  steps:
    - name: Create CachedImage
      try:
        - apply:
            file: 01-cachedimage.yaml
    - name: Verify puller Pod is created
      try:
        - assert:
            file: 02-assert-pod.yaml
    - name: Wait for Ready status
      try:
        - script:
            timeout: 90s
            content: |
              deadline=$(( $(date +%s) + 90 ))
              while [ "$(date +%s)" -lt "$deadline" ]; do
                phase=$(kubectl get cachedimage test-nginx -o jsonpath='{.status.phase}' 2>/dev/null || true)
                nodes_ready=$(kubectl get cachedimage test-nginx -o jsonpath='{.status.nodesReady}' 2>/dev/null || echo 0)
                nodes_targeted=$(kubectl get cachedimage test-nginx -o jsonpath='{.status.nodesTargeted}' 2>/dev/null || echo 0)

                case "$nodes_ready" in
                  ''|*[!0-9]*) nodes_ready=0 ;;
                esac
                case "$nodes_targeted" in
                  ''|*[!0-9]*) nodes_targeted=0 ;;
                esac

                if [ -n "$nodes_ready" ] && [ -n "$nodes_targeted" ] && [ "$nodes_targeted" -ge 1 ] && [ "$nodes_ready" = "$nodes_targeted" ] && [ "$phase" = "Ready" ]; then
                  echo "OK: CachedImage reached Ready with $nodes_ready/$nodes_targeted target nodes"
                  exit 0
                fi

                sleep 2
              done

              kubectl get cachedimage test-nginx -o yaml
              echo "FAIL: CachedImage did not reach Ready on all targeted nodes"
              exit 1
    - name: Cleanup
      try:
        - delete:
            ref:
              apiVersion: puller.corewire.io/v1alpha1
              kind: CachedImage
              name: test-nginx
