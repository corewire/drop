# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: cachedimage-basic
spec:
  description: |
    Verify that creating a CachedImage resource causes the operator to create
    a puller Pod on a target node, and that status transitions to Ready on success.
  steps:
    - name: Create CachedImage
      try:
        - apply:
            file: 01-cachedimage.yaml
    - name: Verify puller Pod is created
      try:
        - assert:
            file: 02-assert-pod.yaml
    - name: Wait for Ready status
      try:
        - assert:
            timeout: 60s
            file: 03-assert-status.yaml
    - name: Cleanup
      try:
        - delete:
            ref:
              apiVersion: puller.corewire.io/v1alpha1
              kind: CachedImage
              name: test-nginx
