apiVersion: puller.corewire.io/v1alpha1
kind: DiscoveryPolicy
metadata:
  name: e2e-registry
spec:
  sources:
    - type: registry
      registry:
        url: "http://registry.e2e-infra.svc.cluster.local:5000"
        repositories:
          - "test/myapp"
        topX: 3
  syncInterval: 30s
  maxImages: 10
