# Assert zero-weight worktime policy: Ready, images discovered but all scores are 0.
# window 0-24 weight=0.0 simulates "nighttime" — all data points are suppressed.
# This demonstrates that images pulled outside business hours get zeroed out.
apiVersion: drop.corewire.io/v1alpha1
kind: DiscoveryPolicy
metadata:
  name: e2e-worktime-zero
status:
  (conditions[?type == 'Ready']):
    - status: "True"
      reason: Synced
  imageCount: 2
  discoveredImages:
    - score: 0
    - score: 0
