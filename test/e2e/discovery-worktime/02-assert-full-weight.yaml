# Assert full-weight worktime policy: Ready, both images discovered with positive scores.
# window 0-24 weight=1.0 means all data points keep their original value.
apiVersion: drop.corewire.io/v1alpha1
kind: DiscoveryPolicy
metadata:
  name: e2e-worktime-full
status:
  (conditions[?type == 'Ready']):
    - status: "True"
      reason: Synced
  imageCount: 2
