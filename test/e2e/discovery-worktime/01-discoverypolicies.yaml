# Two DiscoveryPolicies testing worktime scoring strategy.
# Both query the same seed metrics (aggregation-test namespace, sum aggregation).
#
# Policy 1 (e2e-worktime-full): window 0–24 with weight 1.0
#   → All data points get full weight, scores are normal positive values.
#
# Policy 2 (e2e-worktime-zero): window 0–24 with weight 0.0
#   → All data points get zero weight, simulating "nighttime" suppression.
#   → Images still appear in results but with score=0 (suppressed).
#
# This also seeds busybox (the lower-scoring image) to demonstrate that
# images we do NOT want to prioritize get suppressed by the strategy.
---
apiVersion: drop.corewire.io/v1alpha1
kind: DiscoveryPolicy
metadata:
  name: e2e-worktime-full
spec:
  sources:
    - type: prometheus
      prometheus:
        endpoint: "http://prometheus.e2e-infra.svc.cluster.local:9090"
        query: 'sum(container_cpu_usage_seconds_total{namespace="aggregation-test"}) by (image)'
        queryType: range
        lookback: 1h
        step: 5m
        aggregationMethod: sum
        scoringStrategy:
          type: worktime
          worktime:
            timezone: "UTC"
            windows:
              - startHour: 0
                endHour: 24
                weight: "1.0"
  syncInterval: 30s
  maxImages: 10
---
apiVersion: drop.corewire.io/v1alpha1
kind: DiscoveryPolicy
metadata:
  name: e2e-worktime-zero
spec:
  sources:
    - type: prometheus
      prometheus:
        endpoint: "http://prometheus.e2e-infra.svc.cluster.local:9090"
        query: 'sum(container_cpu_usage_seconds_total{namespace="aggregation-test"}) by (image)'
        queryType: range
        lookback: 1h
        step: 5m
        aggregationMethod: sum
        scoringStrategy:
          type: worktime
          worktime:
            timezone: "UTC"
            windows:
              - startHour: 0
                endHour: 24
                weight: "0.0"
  syncInterval: 30s
  maxImages: 10
