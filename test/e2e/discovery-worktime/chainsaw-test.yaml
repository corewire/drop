# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: discovery-worktime-scoring
spec:
  description: |
    Verify that DiscoveryPolicy scoringStrategy (worktime) with a real 9–17 business-hours
    window correctly weights data points by time of day before aggregation.

    Seed data (injected at known UTC timestamps yesterday via promtool):
      - nginx:1.25-alpine  → data at 09:00–16:59 UTC (business hours)  → weight 1.0  → score > 0
      - redis:7-alpine     → data at 00:00–05:59 UTC (nighttime)        → no window  → weight 0.0 → score = 0

    With maxImages=1, only nginx (the highest-scoring image) appears in discoveredImages.
    redis (score=0) is excluded, demonstrating that nighttime images are suppressed.

    Scoring strategy mirrors the example from the PR description:
      - 09:00–17:00 weight "1.0"  (core business hours)
      - 06:00–09:00 weight "0.3"  (early morning)
      - 17:00–19:00 weight "0.3"  (evening)
      - outside all windows → weight 0.0 (default)
  steps:
    - name: Seed historical worktime data into Prometheus
      try:
        - script:
            timeout: 90s
            content: |
              set -e

              # Compute timestamps: yesterday 09:00–16:59 UTC (business hours for nginx)
              # and yesterday 00:00–05:59 UTC (nighttime for redis).
              NOW=$(date -u +%s)
              YESTERDAY_MIDNIGHT=$(( (NOW / 86400 - 1) * 86400 ))

              # Get the Prometheus pod name
              PROM_POD=$(kubectl get pods -n e2e-infra -l app=prometheus -o jsonpath='{.items[0].metadata.name}')
              echo "Prometheus pod: $PROM_POD"

              # Build the OpenMetrics file content: one sample per 5 minutes within each window.
              # prometheus staleness window is 5m, so 5-minute resolution ensures every
              # hourly query step finds a sample.
              {
                echo "# HELP worktime_test_cpu Worktime e2e test metric"
                echo "# TYPE worktime_test_cpu gauge"

                # Business-hours data for nginx (09:00–16:59 UTC, every 5 minutes)
                for hour in 9 10 11 12 13 14 15 16; do
                  for min in 0 5 10 15 20 25 30 35 40 45 50 55; do
                    TS=$(( YESTERDAY_MIDNIGHT + hour * 3600 + min * 60 ))
                    echo "worktime_test_cpu{image=\"docker.io/library/nginx:1.25-alpine\",namespace=\"worktime-test\"} 1000 $TS"
                  done
                done

                # Nighttime data for redis (00:00–05:59 UTC, every 5 minutes)
                for hour in 0 1 2 3 4 5; do
                  for min in 0 5 10 15 20 25 30 35 40 45 50 55; do
                    TS=$(( YESTERDAY_MIDNIGHT + hour * 3600 + min * 60 ))
                    echo "worktime_test_cpu{image=\"docker.io/library/redis:7-alpine\",namespace=\"worktime-test\"} 1000 $TS"
                  done
                done

                echo "# EOF"
              } | kubectl exec -i -n e2e-infra "$PROM_POD" -- /bin/sh -c 'cat > /tmp/worktime-seed.om'
              echo "OpenMetrics seed file written to pod"

              # Create TSDB blocks from the OpenMetrics data
              kubectl exec -n e2e-infra "$PROM_POD" -- promtool tsdb create-blocks-from openmetrics /tmp/worktime-seed.om /prometheus
              echo "TSDB blocks created"

              # Reload Prometheus to pick up the new blocks
              kubectl exec -n e2e-infra "$PROM_POD" -- wget -q --post-data='' -O /dev/null http://localhost:9090/-/reload
              echo "Prometheus reload triggered"

              # Wait for Prometheus to be ready and seed data to be queryable
              for i in $(seq 1 30); do
                RESULT=$(kubectl exec -n e2e-infra "$PROM_POD" -- wget -q -O- "http://localhost:9090/api/v1/query?query=worktime_test_cpu%7Bimage%3D%22docker.io%2Flibrary%2Fnginx%3A1.25-alpine%22%7D" 2>/dev/null || echo "")
                if echo "$RESULT" | grep -q "nginx"; then
                  echo "Seed data queryable after ${i}s"
                  exit 0
                fi
                sleep 3
              done
              echo "ERROR: seed data not queryable after 90s" >&2
              exit 1

    - name: Create DiscoveryPolicy with 9-17 worktime scoring strategy
      try:
        - apply:
            file: 01-discoverypolicy.yaml

    - name: Assert policy is Ready and only the business-hours image is discovered
      try:
        - assert:
            timeout: 120s
            file: 02-assert-worktime.yaml

    - name: Verify redis (nighttime image) is excluded from discoveredImages
      try:
        - script:
            timeout: 30s
            content: |
              IMAGES=$(kubectl get discoverypolicy e2e-worktime-business -o jsonpath='{.status.discoveredImages[*].image}' 2>/dev/null || echo "")
              echo "Discovered images: $IMAGES"

              if echo "$IMAGES" | grep -q "redis"; then
                echo "FAIL: redis (nighttime image, score=0) must not appear in discoveredImages"
                exit 1
              fi

              SCORE=$(kubectl get discoverypolicy e2e-worktime-business -o jsonpath='{.status.discoveredImages[0].score}' 2>/dev/null || echo "")
              if [ -z "$SCORE" ] || [ "$SCORE" -le 0 ] 2>/dev/null; then
                echo "FAIL: nginx (business-hours image) must have score > 0, got '$SCORE'"
                exit 1
              fi

              echo "OK: nginx discovered with score=$SCORE; redis correctly excluded (score=0, maxImages=1)"

    - name: Cleanup
      try:
        - delete:
            ref:
              apiVersion: drop.corewire.io/v1alpha1
              kind: DiscoveryPolicy
              name: e2e-worktime-business

