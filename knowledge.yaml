errors:
  - reason: Cached
    controller: CachedImage
    meaning: All target nodes have the image cached
  - reason: Degraded
    controller: CachedImageSet
    meaning: Some child CachedImages have failures
    troubleshooting: Check individual CachedImage statuses
  - reason: ErrImagePull
    controller: CachedImage
    meaning: Registry unreachable or image does not exist
    troubleshooting: Verify registry DNS, image name, tag. Check network policies
  - reason: ImagePullBackOff
    controller: CachedImage
    meaning: Repeated pull failures, kubelet is backing off
    troubleshooting: Check imagePullSecrets, registry auth. Verify image exists
  - reason: InProgress
    controller: CachedImage
    meaning: Image pulls are actively running on some nodes
  - reason: InvalidImageName
    controller: CachedImage
    meaning: The image reference is malformed
    troubleshooting: 'Check spec.image format: registry/repository'
  - reason: PartiallyFailed
    controller: DiscoveryPolicy
    meaning: Some discovery sources failed to sync
    troubleshooting: Check source endpoints and credentials
  - reason: PodFailed
    controller: CachedImage
    meaning: Puller Pod failed for a non-image-pull reason
    troubleshooting: Check node health, resource limits, Pod security policies
  - reason: Progressing
    controller: CachedImageSet
    meaning: Children are still being pulled
  - reason: PullFailed
    controller: CachedImage
    meaning: One or more nodes failed to pull the image
    troubleshooting: Check image name, tag, registry connectivity, imagePullSecrets
  - reason: Ready
    controller: CachedImageSet
    meaning: All child CachedImages are ready
  - reason: RegistryUnavailable
    controller: CachedImage
    meaning: Cannot connect to the container registry
    troubleshooting: Check registry URL, DNS, firewall rules
  - reason: SourceError
    controller: DiscoveryPolicy
    meaning: One or more discovery sources returned errors
    troubleshooting: Check source configuration and connectivity
  - reason: SyncFailed
    controller: DiscoveryPolicy
    meaning: All discovery sources failed
    troubleshooting: Check all source endpoints, credentials, network
  - reason: Synced
    controller: DiscoveryPolicy
    meaning: All sources synced successfully
