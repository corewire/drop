samples: |
  # Dev samples: deployed by Tilt for interactive testing
  ---
  # === PullPolicy ===
  apiVersion: drop.corewire.io/v1alpha1
  kind: PullPolicy
  metadata:
    name: dev-conservative
  spec:
    maxConcurrentNodes: 1
    minDelayBetweenPulls: 5s
    repullInterval: 1h
    failureBackoff:
      initial: 30s
      max: 5m
  ---
  # === CachedImage: healthy ===
  apiVersion: drop.corewire.io/v1alpha1
  kind: CachedImage
  metadata:
    name: dev-nginx
  spec:
    image: docker.io/library/nginx
    tag: "1.25-alpine"
    policyRef:
      name: dev-conservative
  ---
  apiVersion: drop.corewire.io/v1alpha1
  kind: CachedImage
  metadata:
    name: dev-redis
  spec:
    image: docker.io/library/redis
    tag: "7-alpine"
    policyRef:
      name: dev-conservative
  ---
  # === CachedImage: broken (DNS failure → ImagePullBackOff) ===
  apiVersion: drop.corewire.io/v1alpha1
  kind: CachedImage
  metadata:
    name: test-invalid-image
  spec:
    image: registry.invalid.local:9999/does-not-exist
    tag: "nope"
    policyRef:
      name: dev-conservative
  ---
  # === CachedImageSet: healthy (static images) ===
  apiVersion: drop.corewire.io/v1alpha1
  kind: CachedImageSet
  metadata:
    name: dev-set
  spec:
    policyRef:
      name: dev-conservative
    images:
      - image: docker.io/library/alpine
        tag: "3.19"
      - image: docker.io/library/busybox
        tag: "1.36"
  ---
  # === CachedImageSet: dynamic (backed by DiscoveryPolicy) ===
  apiVersion: drop.corewire.io/v1alpha1
  kind: CachedImageSet
  metadata:
    name: dev-set-discovered
  spec:
    policyRef:
      name: dev-conservative
    discoveryPolicyRef:
      name: dev-registry
  ---
  # === DiscoveryPolicy: healthy (Prometheus range query) ===
  apiVersion: drop.corewire.io/v1alpha1
  kind: DiscoveryPolicy
  metadata:
    name: dev-prometheus
  spec:
    sources:
      - type: prometheus
        prometheus:
          endpoint: "http://prometheus.e2e-infra.svc.cluster.local:9090"
          query: 'count(container_memory_working_set_bytes{container!="", namespace="build-stuff"}) by (image)'
          lookback: 24h
          step: 5m
    syncInterval: 30s
    maxImages: 10
  ---
  # === DiscoveryPolicy: healthy (registry tag listing) ===
  apiVersion: drop.corewire.io/v1alpha1
  kind: DiscoveryPolicy
  metadata:
    name: dev-registry
  spec:
    sources:
      - type: registry
        registry:
          url: "http://registry.e2e-infra.svc.cluster.local:5000"
          repositories:
            - "test/myapp"
          topX: 3
    syncInterval: 30s
    maxImages: 10
  ---
  # === DiscoveryPolicy: broken (DNS error → DNSError) ===
  apiVersion: drop.corewire.io/v1alpha1
  kind: DiscoveryPolicy
  metadata:
    name: test-broken-prom
  spec:
    sources:
      - type: prometheus
        prometheus:
          endpoint: "http://nonexistent-prometheus:9090"
          query: "up{}"
    syncInterval: 30m
    maxImages: 10
  ---
  # === DiscoveryPolicy: broken (DNS error → DNSError) ===
  apiVersion: drop.corewire.io/v1alpha1
  kind: DiscoveryPolicy
  metadata:
    name: test-broken-registry
  spec:
    sources:
      - type: registry
        registry:
          url: "http://nonexistent-registry:5000"
          repositories:
            - "test/nope"
    syncInterval: 30m
    maxImages: 10
  ---
  # === DiscoveryPolicy: broken (repo doesn't exist → NotFound) ===
  apiVersion: drop.corewire.io/v1alpha1
  kind: DiscoveryPolicy
  metadata:
    name: test-notfound-repo
  spec:
    sources:
      - type: registry
        registry:
          url: "http://registry.e2e-infra.svc.cluster.local:5000"
          repositories:
            - "this/does-not-exist"
    syncInterval: 30m
    maxImages: 10
